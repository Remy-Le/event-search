name: Weekly Paris Events Scraper

on:
  schedule:
    # Every Monday at 9:00 AM Paris time (UTC+2 in summer, UTC+1 in winter)
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py
        env:
          # No API keys needed — this uses browser scraping
          # Add secrets here later if needed
          PYTHONUNBUFFERED: 1

      - name: Commit updated CSV
        run: |
          git config user.name "events-scraper[bot]"
          git config user.email "events-scraper[bot]@users.noreply.github.com"
          git add -f events.csv
          git diff --staged --quiet || git commit -m "weekly scrape: update events.csv"
          git pull --rebase --autostash
          git push
